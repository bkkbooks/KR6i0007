body:
  text: 隋天竺三藏闍那崛多譯如是我聞一時佛在舍衛國祇樹給孤獨園與大比丘僧千二百五十人俱復有大乘衆菩薩摩訶薩十千人俱爾時世尊與無量無數百千萬衆前後圍繞而為説法爾時尊者舍利弗於大衆中即從座起偏袒右肩右膝著地向佛合掌而白佛言世尊我有疑心今欲發問惟願如來憐愍衆生為我解説爾時世尊告舍利弗言善男子隨汝所問若有疑心吾當為汝分別解説時舍利弗蒙佛印可許決疑網歡喜踊躍即白佛言世尊頗有現在十方世界諸佛世尊往昔願力常為衆生現在説法彼諸如來所有名號若善男子及善女人欲得誦持此諸佛名若讀若聞及以書寫緣是功德便於阿耨多羅三藐三菩提得不退轉無所缺減至於無上正真之道速得成於阿耨多羅三藐三菩提者不爾時世尊告舍利弗言善哉善哉善男子汝所咨問真妙辨才為於來世無量衆生廣作利益慈悲哀愍一切天人能問如來如斯奧義是故汝今諦聽諦受善思念之吾當為汝分別解説舍利弗言唯然世尊願樂欲聞爾時世尊告舍利弗言善男子東方去此過一恆河沙世界有一佛剎名難降伏於彼國土有佛世尊號善説稱功德如來至真等正覺於今現在為諸大衆説微妙法復次舍利弗從此東方過二恆河沙世界有一佛剎名無障礙於彼國土有佛世尊號因陀羅相幢星王如來至真等正覺於今現在亦為大衆説微妙法復次舍利弗從此東方過三恆河沙世界有一佛剎名曰愛樂於彼國土有佛世尊號普光明功德莊嚴如來至真等正覺於今現在亦為大衆説微妙法復次舍利弗從此東方過四恆河沙世界有一佛剎名曰普入於彼國土有佛世尊號善鬪戰難降伏超越如來至真等正覺於今現在亦為大衆説微妙法復次舍利弗從此東方過五恆河沙世界有一佛剎名曰淨聚於彼國土有佛世尊號普功德明莊嚴如來至真等正覺於今現在亦為大衆説微妙法復次舍利弗從此東方過六恆河沙世界有一佛剎名無毒主於彼國土有佛世尊號無礙藥樹功德稱如來至真等正覺於今現在亦為大衆説微妙法復次舍利弗從此東方過七恆河沙世界有一佛剎名側塞香滿於彼國土有佛世尊號步寶蓮華如來至真等正覺於今現在亦為大衆説微妙法復次舍利弗從此東方過八恆河沙世界有一佛剎名妙音明於彼國土有佛世尊號寶蓮花善住娑羅樹王如來至真等正覺於今現在亦為大衆説微妙法舍利弗是等諸佛如來至真等正覺如是佛剎清淨無穢無有五濁復無五欲其中衆生無有諂曲虛偽之心亦無欲行及以女人復次舍利弗若善男子及善女人得聞彼等諸佛世尊如是名號既得聞已能自受持讀誦修行復為他人宣揚顯説彼善男子及善女人若墮三惡道者無有是處惟除五逆誹謗正法及謗聖人復次舍利弗若善男子善女人得聞彼等諸佛世尊如是名號既得聞已能自受持讀誦修行復為他人宣揚顯説如是之人乃至菩提於其中間生生之處常具五通兼復逮得諸陀羅尼六根完具無諸殘缺常得歡喜身毛右旋復次舍利弗若善男子及善女人得聞彼等諸佛世尊如是名號既得聞已能自受持讀誦修行復為他人宣揚顯説彼等衆生所在之處縣官惡賊不能得便火不能焚水不能漂惡龍惡蛇不能毒害若行若住師子虎狼熊羆豺豹夜叉羅剎諸惡鬼神鳩槃荼等及人非人能作驚惶無有是處惟除宿殃復次舍利弗若有女人能厭其身繫念專心受持讀誦如是世尊諸佛名號復為他人分別顯説壽終之後更復受於女人身者無有是處復次舍利弗若有善男子善女人於靜夜中能誦如是諸佛名號是等衆生於現世間所作功業皆速成就日日增長無諸障礙爾時世尊欲重明此義而説偈言若有諸衆生能持是佛名悉捨諸惡道速生於善處常在諸佛前恆聞説妙法既覩無上尊隨心而供養誦持佛名故超億千萬劫一切諸煩惱疾成得菩提若人滿七日能誦是佛名即得清淨眼便能見諸佛若有聞佛名即能誦持者隨其所生處常為他所敬相好形端正常生福樂家喜心行大捨聰明不放逸若有諸女人聞此佛名故自誦為他説其福不可量於此壽終已必捨女人報得受丈夫身生生常利根誦持佛名故多百億劫中口氣常芬馥恆如栴檀香彼等諸大仙如是諸名字若能誦持者細心不放逸誦持佛名故父母及兄弟并餘諸眷屬終無異苦惱誦持佛名故一切魔波旬黑暗衆眷屬終不能障礙惡毒不能害刀杖及火等縣官惡賊盜一切不能傷誦持佛名故千億諸劫中常生寶蓮華威相神通具常在虛空中遍不思議剎觀諸異佛土剎中清淨者證無上道已普為諸雜類諸天及世人能作歸依處佛説是經已長老舍利弗及天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等一切大衆聞佛所説歡喜奉行
